<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Portal do Cliente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/portal.css" />
</head>

<body>

<div class="container py-5">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">

  <!-- Título -->
  <h3 class="fw-bold mb-0">
    <i class="bi bi-bar-chart-line-fill me-2"></i>
    📊 Portal do Cliente
  </h3>

  <!-- Ações -->
  <div class="d-flex align-items-center gap-4">

    <!-- Usuário Dropdown -->
    <div class="dropdown">
      <button class="btn btn-dark border-secondary d-flex align-items-center gap-2 dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false">

        <i class="bi bi-person-circle fs-5"></i>
        <span id="adminNome">Admin</span>
      </button>

      <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary">
        <li>
          <button class="dropdown-item text-light bg-dark"
                  onclick="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>
            Sair
          </button>
        </li>
      </ul>
    </div>

  </div>

</div>
  <!-- Dados -->
  <div class="card mb-4">
    <div class="card-body" id="dadosCliente"></div>
  </div>

  <!-- Proposta -->
  <div class="card mb-4">
    <div class="card-body" id="propostaCliente"></div>
  </div>

  <!-- Status -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Status do Projeto</h5>
      <div id="timelineProjeto"></div>
    </div>
  </div>

  <!-- Pagamentos -->
  <div class="card mb-4 d-none" id="pagamentosCard">
    <div class="card-body">
      <h5>Histórico de Pagamentos</h5>
      <div id="pagamentosCliente"></div>
    </div>
  </div>

</div>

<!-- Bootstrap JS (OBRIGATÓRIO para tooltip) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="./js/configSettings.js"></script>
<script src="./js/supabaseClientPortal.js"></script>
<script src="./js/dashboard-portal.js"></script>

</body>
</html>
