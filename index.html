<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Codificando Ideias</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://vwzxirmphsnwflphiaog.supabase.co" crossorigin>
 <!-- Favicon -->
    <link rel="icon" href="../assets/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/login.css" rel="stylesheet">

</head>

<body>

<div class="login-wrapper">

  <div class="login-card">

    <div class="logo-area">
      <a href="../index.html" aria-label="Voltar para página inicial">
        <img class="logo-login"
             src="../assets/logo-master-transparent.png"
             alt="Codificando Ideias"
             width="200"
             height="200"
             decoding="async"
             fetchpriority="high">
      </a>
      <h1 class="h5 login-title">Portal do cliente</h1>
    </div>

    <form id="loginForm">

      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-0 text-light">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" autocomplete="email" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-0 text-light">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-gradient w-100 mt-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Entrar
      </button>

      <div id="erro" class="text-danger mt-3 text-center small" aria-live="polite"></div>

    </form>

    <div class="footer-text">
      © <script>document.write(new Date().getFullYear());</script> Codificando Ideias
    </div>

  </div>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="../js/configSettings.js"></script>
<script defer src="../js/supabaseClientPortal.js"></script>
<script defer src="../js/login.js"></script>

</body>
</html>
